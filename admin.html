<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GADA 예약 어드민</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gada: #00B87A; --gada-dk: #00965F;
      --dark: #0F172A; --dark2: #1E293B; --dark3: #334155;
      --t1: #F8FAFC; --t2: rgba(248,250,252,.65); --t3: rgba(248,250,252,.35);
      --r: 12px; --r-sm: 8px;
    }
    body { background: var(--dark); color: var(--t1); font-family: 'Pretendard', -apple-system, sans-serif; min-height: 100vh; }

    /* Login */
    #loginWrap {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: var(--dark2); border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 360px;
    }
    .login-box h2 { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
    .login-box p  { font-size: 13px; color: var(--t3); margin-bottom: 28px; }
    .login-box input {
      width: 100%; background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: var(--r-sm); color: var(--t1); font-size: 15px; padding: 12px 14px;
      outline: none; font-family: inherit; transition: border-color .15s;
    }
    .login-box input:focus { border-color: var(--gada); }
    .login-box button {
      width: 100%; margin-top: 14px; background: var(--gada); color: #fff;
      border: none; border-radius: var(--r-sm); padding: 14px; font-size: 15px;
      font-weight: 800; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .login-box button:hover { background: var(--gada-dk); }
    .login-err { color: #FF6B6B; font-size: 12px; margin-top: 8px; display: none; }

    /* Main */
    #mainWrap { display: none; }

    header {
      background: var(--dark2); border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 16px; font-weight: 900; }
    .logo span { color: var(--gada); }
    .logout-btn {
      background: rgba(255,255,255,.07); border: none; color: var(--t2);
      padding: 7px 16px; border-radius: 99px; font-size: 13px; cursor: pointer; font-family: inherit;
    }

    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,.08); }
    .tab-btn {
      padding: 10px 20px; background: none; border: none; color: var(--t3);
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--t1); border-color: var(--gada); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--dark2); border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--r); padding: 24px; margin-bottom: 20px;
    }
    .card h3 { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
    .card .desc { font-size: 13px; color: var(--t3); margin-bottom: 20px; }

    /* Form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; font-weight: 700; color: var(--t3); letter-spacing: .06em; text-transform: uppercase; }
    .field input, .field select {
      background: rgba(255,255,255,.06); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: var(--r-sm); color: var(--t1); font-size: 14px; padding: 10px 12px;
      outline: none; font-family: inherit; transition: border-color .15s; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { border-color: var(--gada); }

    .day-checks { display: flex; gap: 8px; flex-wrap: wrap; }
    .day-check { display: flex; align-items: center; gap: 6px; }
    .day-check input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--gada); cursor: pointer; }
    .day-check label { font-size: 13px; color: var(--t2); cursor: pointer; }

    .save-btn {
      margin-top: 20px; background: var(--gada); color: #fff; border: none;
      border-radius: var(--r-sm); padding: 11px 24px; font-size: 14px; font-weight: 800;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .save-btn:hover { background: var(--gada-dk); }
    .save-ok { font-size: 12px; color: var(--gada); margin-left: 12px; display: none; }

    /* Block dates */
    .block-form { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .block-form .field { flex: 1; }
    .block-form button {
      background: rgba(255,100,100,.15); border: 1px solid rgba(255,100,100,.3);
      color: #FF6B6B; border-radius: var(--r-sm); padding: 10px 18px;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .blocked-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .blocked-chip {
      background: rgba(255,100,100,.1); border: 1px solid rgba(255,100,100,.25);
      color: #FF6B6B; border-radius: 99px; padding: 5px 12px; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .blocked-chip button {
      background: none; border: none; color: #FF6B6B; cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0;
    }
    .empty-msg { font-size: 13px; color: var(--t3); }

    /* Bookings table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--t3); letter-spacing: .06em; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,.08); white-space: nowrap; }
    td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,.05); color: var(--t2); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }
    .badge-new { background: rgba(0,184,122,.12); color: #4DFFA8; border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 700; }
    .meet-link { color: var(--gada); text-decoration: none; font-size: 12px; }
    .meet-link:hover { text-decoration: underline; }

    .refresh-btn {
      background: rgba(255,255,255,.07); border: none; color: var(--t2);
      padding: 8px 16px; border-radius: var(--r-sm); font-size: 13px; cursor: pointer;
      font-family: inherit; margin-bottom: 16px;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      .container { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginWrap">
  <div class="login-box">
    <h2>GADA 어드민</h2>
    <p>예약 관리 시스템에 로그인하세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()" />
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
    <button onclick="login()">로그인</button>
  </div>
</div>

<!-- Main -->
<div id="mainWrap">
  <header>
    <div class="logo"><span>GADA</span> 예약 어드민</div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('bookings')">예약 현황</button>
      <button class="tab-btn" onclick="switchTab('settings')">가용 시간 설정</button>
      <button class="tab-btn" onclick="switchTab('block')">날짜 차단</button>
    </div>

    <!-- 예약 현황 -->
    <div class="tab-panel active" id="tab-bookings">
      <button class="refresh-btn" onclick="loadBookings()">↻ 새로고침</button>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>날짜</th><th>시간</th><th>건설사</th><th>담당자</th>
                <th>연락처</th><th>이메일</th><th>미팅 링크</th><th>등록일</th>
              </tr>
            </thead>
            <tbody id="bookingsTbody">
              <tr><td colspan="8" class="empty-msg" style="text-align:center;padding:32px;">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 가용 시간 설정 -->
    <div class="tab-panel" id="tab-settings">
      <div class="card">
        <h3>미팅 가능 시간 설정</h3>
        <p class="desc">저장 즉시 예약 폼에 반영됩니다.</p>

        <div style="margin-bottom:20px;">
          <div class="field">
            <label>가용 요일</label>
            <div class="day-checks" id="dayChecks"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>시작 시각</label>
            <select id="cfgStart"></select>
          </div>
          <div class="field">
            <label>종료 시각</label>
            <select id="cfgEnd"></select>
          </div>
        </div>

        <div class="form-row" style="margin-top:16px;">
          <div class="field">
            <label>슬롯 단위 (분)</label>
            <select id="cfgSlot">
              <option value="30">30분</option>
              <option value="60" selected>1시간</option>
              <option value="90">1시간 30분</option>
              <option value="120">2시간</option>
            </select>
          </div>
          <div class="field">
            <label>예약 가능 기간 (일)</label>
            <input type="number" id="cfgMaxDays" min="7" max="90" value="30" />
          </div>
        </div>

        <div style="display:flex;align-items:center;">
          <button class="save-btn" onclick="saveConfig()">저장</button>
          <span class="save-ok" id="cfgOk">✓ 저장됨</span>
        </div>
      </div>
    </div>

    <!-- 날짜 차단 -->
    <div class="tab-panel" id="tab-block">
      <div class="card">
        <h3>특정 날짜 차단</h3>
        <p class="desc">공휴일, 회의일 등 예약 불가 날짜를 설정합니다.</p>
        <div class="block-form">
          <div class="field">
            <label>날짜 선택</label>
            <input type="date" id="blockDate" />
          </div>
          <button onclick="addBlock()">차단 추가</button>
        </div>
        <div class="blocked-list" id="blockedList"></div>
      </div>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = '';  // Apps Script 웹 앱 URL을 여기에 입력
var PW = '';

var DAYS = ['일', '월', '화', '수', '목', '금', '토'];

// ── Login ──────────────────────────────────────────────────
function login() {
  var pw = document.getElementById('pwInput').value;
  if (!SCRIPT_URL) {
    // URL 미설정 시 로컬 모드
    alert('⚠️ admin.html의 SCRIPT_URL 변수에 Apps Script URL을 입력해주세요.');
    return;
  }
  PW = pw;
  // 서버에서 config 로드로 비밀번호 검증
  fetch(SCRIPT_URL + '?action=config&pw=' + encodeURIComponent(pw))
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.error === 'unauthorized') {
        document.getElementById('loginErr').style.display = 'block';
      } else {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('mainWrap').style.display = 'block';
        initSettings(d);
        loadBookings();
        loadBlocked();
      }
    })
    .catch(function () {
      document.getElementById('loginErr').style.display = 'block';
    });
}

function logout() {
  PW = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('mainWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ── Tabs ───────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function (b, i) {
    var names = ['bookings', 'settings', 'block'];
    b.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(function (p) {
    p.classList.toggle('active', p.id === 'tab-' + name);
  });
}

// ── Settings ───────────────────────────────────────────────
function initSettings(cfg) {
  // Day checkboxes
  var wrap = document.getElementById('dayChecks');
  wrap.innerHTML = '';
  DAYS.forEach(function (d, i) {
    var chk = document.createElement('label');
    chk.className = 'day-check';
    chk.innerHTML = '<input type="checkbox" value="' + i + '"' + (cfg.workDays && cfg.workDays.indexOf(i) !== -1 ? ' checked' : '') + ' />' + d;
    wrap.appendChild(chk);
  });

  // Hour selects
  ['cfgStart', 'cfgEnd'].forEach(function (id) {
    var sel = document.getElementById(id);
    sel.innerHTML = '';
    for (var h = 0; h <= 23; h++) {
      var opt = document.createElement('option');
      opt.value = h;
      opt.textContent = pad2(h) + ':00';
      sel.appendChild(opt);
    }
  });
  document.getElementById('cfgStart').value = cfg.startHour || 9;
  document.getElementById('cfgEnd').value   = cfg.endHour   || 18;
  document.getElementById('cfgSlot').value  = cfg.slotMin   || 60;
  document.getElementById('cfgMaxDays').value = cfg.maxDaysAhead || 30;
}

function saveConfig() {
  var days = [];
  document.querySelectorAll('#dayChecks input:checked').forEach(function (c) { days.push(parseInt(c.value)); });
  var cfg = {
    workDays:     days,
    startHour:    parseInt(document.getElementById('cfgStart').value),
    endHour:      parseInt(document.getElementById('cfgEnd').value),
    slotMin:      parseInt(document.getElementById('cfgSlot').value),
    maxDaysAhead: parseInt(document.getElementById('cfgMaxDays').value)
  };
  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'updateConfig', pw: PW, config: cfg })
  }).then(function (r) { return r.json(); }).then(function (d) {
    if (d.ok) { var ok = document.getElementById('cfgOk'); ok.style.display = 'inline'; setTimeout(function () { ok.style.display = 'none'; }, 2000); }
  });
}

// ── Bookings ───────────────────────────────────────────────
function loadBookings() {
  var tbody = document.getElementById('bookingsTbody');
  tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:rgba(248,250,252,.35);">불러오는 중...</td></tr>';
  fetch(SCRIPT_URL + '?action=bookings&pw=' + encodeURIComponent(PW))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:rgba(248,250,252,.35);">예약 내역이 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = data.reverse().map(function (b) {
        return '<tr>'
          + '<td>' + (b['날짜'] || '') + '</td>'
          + '<td>' + (b['시간'] || '') + '</td>'
          + '<td>' + (b['건설사'] || '') + '</td>'
          + '<td>' + (b['담당자'] || '') + '</td>'
          + '<td>' + (b['연락처'] || '') + '</td>'
          + '<td>' + (b['이메일'] || '') + '</td>'
          + '<td>' + (b['미팅링크'] ? '<a href="' + b['미팅링크'] + '" target="_blank" class="meet-link">참여하기</a>' : '-') + '</td>'
          + '<td style="font-size:11px;color:rgba(248,250,252,.35);">' + ((b['등록일시'] || '').toString().slice(0, 16)) + '</td>'
          + '</tr>';
      }).join('');
    })
    .catch(function () {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#FF6B6B;">불러오기 실패</td></tr>';
    });
}

// ── Block dates ────────────────────────────────────────────
function loadBlocked() {
  fetch(SCRIPT_URL + '?action=blocked&pw=' + encodeURIComponent(PW))
    .then(function (r) { return r.json(); })
    .then(renderBlocked);
}

function addBlock() {
  var d = document.getElementById('blockDate').value;
  if (!d) return;
  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'blockDate', pw: PW, date: d, block: true })
  }).then(function (r) { return r.json(); }).then(function (res) { renderBlocked(res.blocked); });
}

function removeBlock(d) {
  fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'blockDate', pw: PW, date: d, block: false })
  }).then(function (r) { return r.json(); }).then(function (res) { renderBlocked(res.blocked); });
}

function renderBlocked(list) {
  var wrap = document.getElementById('blockedList');
  if (!list || !list.length) {
    wrap.innerHTML = '<span class="empty-msg">차단된 날짜가 없습니다.</span>';
    return;
  }
  wrap.innerHTML = list.sort().map(function (d) {
    return '<span class="blocked-chip">' + d + '<button onclick="removeBlock(\'' + d + '\')">✕</button></span>';
  }).join('');
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }
</script>
</body>
</html>
